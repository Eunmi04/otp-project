<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>보안프로토콜</title>
</head>
<body>

<h1>OTP 과제</h1>

<h2>TOTP</h2>
<p id="totp">loading...</p>

<h2>HOTP</h2>
<button onclick="generateHOTP()">Generate HOTP</button>
<p id="hotp"></p>

<h2>Challenge</h2>
<button onclick="runChallenge()">Run</button>
<p id="challenge"></p>

<script>
const secret = "MY_SECRET";
let counter = 1;

// 간단 해시
async function hash(text) {
    const data = new TextEncoder().encode(text);
    const buffer = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(buffer))
        .map(b => b.toString(16).padStart(2, '0'))
        .join('');
}

// TOTP
async function updateTOTP() {
    const time = Math.floor(Date.now() / 1000 / 30);
    const otp = await hash(secret + time);
    document.getElementById("totp").innerText = otp.slice(0, 6);
}

setInterval(updateTOTP, 1000);

// HOTP
async function generateHOTP() {
    const otp = await hash(secret + counter);
    document.getElementById("hotp").innerText =
        "counter=" + counter + " → " + otp.slice(0, 6);
    counter++;
}

// Challenge
async function runChallenge() {
    const challenge = Math.random().toString(36).substring(2, 8);
    const response = await hash(secret + challenge);

    document.getElementById("challenge").innerText =
        "challenge=" + challenge + "\nresponse=" + response;
}
</script>

</body>
</html>
